version: "3.9"

services:
  mariadb:
    image: mariadb:11
    container_name: cotizador-mariadb
    environment:
      MARIADB_DATABASE: cotizador_danos
      MARIADB_USER: cotizador
      MARIADB_PASSWORD: cotizador123
      MARIADB_ROOT_PASSWORD: root123
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: cotizador-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/cotizador_danos
      SPRING_DATASOURCE_USERNAME: cotizador
      SPRING_DATASOURCE_PASSWORD: cotizador123
    ports:
      - "8080:8080"
    depends_on:
      mariadb:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: cotizador-frontend
    ports:
      - "4200:4200"
    depends_on:
      - backend

volumes:
  mariadb_data:
