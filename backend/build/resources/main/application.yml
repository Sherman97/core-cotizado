spring:
  application:
    name: plataforma-danos-back
  profiles:
    default: mariadb
  jackson:
    default-property-inclusion: non_null
  main:
    banner-mode: "off"

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.cotizador.danos: INFO

---
spring:
  config:
    activate:
      on-profile: local
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

app:
  datasource:
    enabled: false

---
spring:
  config:
    activate:
      on-profile: mariadb
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3306/cotizador_danos}
    username: ${SPRING_DATASOURCE_USERNAME:cotizador}
    password: ${SPRING_DATASOURCE_PASSWORD:cotizador123}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  datasource:
    enabled: true
